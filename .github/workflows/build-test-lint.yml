name: CI

# Build + tests + lint for my--father-mother.
# Runs on every pull request and on pushes to the default branch.
#
# The project is a single-file, stdlib-only Python CLI (main.py) with a
# pytest suite under tests/ and `black` as its declared formatter (see
# CLAUDE.md). This workflow exercises all three of that stack:
#   * build — byte-compile + import smoke test (deterministic gate)
#   * test  — the pytest suite across supported Python versions (gate)
#   * lint  — `black --check` (reports formatting drift; non-blocking, see below)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (compile + import)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile sources
        # Catches syntax errors across the whole tree without needing any deps.
        run: python -m compileall -q main.py scripts

      - name: Import smoke test
        # The CLI is stdlib-only at runtime, so a bare import must succeed
        # without any optional dependency (sentence-transformers, langdetect).
        run: python -c "import main; print('main imported OK')"

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # Runtime is stdlib-only; the suite only needs pytest. Optional deps
        # are intentionally omitted — the code falls back gracefully and the
        # suite covers that path.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

  lint:
    name: lint (black)
    runs-on: ubuntu-latest
    # Reports formatting drift as a visible check but does not block merges:
    # `black` is the repo's declared formatter, yet enforcing it as a hard
    # gate on the existing ~5k-line main.py could red-flag every open PR over
    # pre-existing style. Surface it here; promote to a required check once
    # the tree is confirmed clean (`black .`).
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          python -m pip install black

      - name: Check formatting
        run: python -m black --check --diff main.py tests scripts
